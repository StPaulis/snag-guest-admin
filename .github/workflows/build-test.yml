name: build & test

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      # typecheck (tsc -b) + vite build, per CLAUDE.md this must pass before any task is done
      - run: npm run build
